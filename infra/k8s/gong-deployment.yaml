# Replace 574016082345 and us-east-1 before applying.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gong-http-server
  namespace: id-pain
  labels:
    app: gong-http-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gong-http-server
  template:
    metadata:
      labels:
        app: gong-http-server
    spec:
      containers:
        - name: gong
          image: 574016082345.dkr.ecr.us-east-1.amazonaws.com/gong-http-server:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: gong-secrets
          resources:
            requests:
              memory: "192Mi"
              cpu: "50m"
            limits:
              memory: "384Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
