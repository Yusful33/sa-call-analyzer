# Replace 574016082345 and us-east-1 before applying, e.g.:
# sed -e 's/574016082345/123456789012/' -e 's/us-east-1/us-east-1/' k8s/deployment.yaml | kubectl apply -f -
apiVersion: apps/v1
kind: Deployment
metadata:
  name: id-pain
  namespace: id-pain
  labels:
    app: id-pain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: id-pain
  template:
    metadata:
      labels:
        app: id-pain
    spec:
      containers:
        - name: app
          image: 574016082345.dkr.ecr.us-east-1.amazonaws.com/id-pain:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: id-pain-config
            - secretRef:
                name: id-pain-secrets
          resources:
            requests:
              memory: "384Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
