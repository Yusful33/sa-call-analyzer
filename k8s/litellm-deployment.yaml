# Replace 574016082345 and us-east-1 before applying.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: id-pain
  labels:
    app: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: 574016082345.dkr.ecr.us-east-1.amazonaws.com/litellm:latest
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - configMapRef:
                name: litellm-config
            - secretRef:
                name: litellm-secrets
          resources:
            requests:
              memory: "192Mi"
              cpu: "50m"
            limits:
              memory: "384Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
