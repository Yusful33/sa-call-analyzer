# Replace <AWS_ACCOUNT_ID> and <AWS_REGION> before applying.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: id-pain
  labels:
    app: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/litellm:latest
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - configMapRef:
                name: litellm-config
            - secretRef:
                name: litellm-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
