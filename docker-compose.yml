# Stillness - Simple Local Development with Docker
# Uses Vercel-deployed Gong MCP (no need to run locally)
#
# Usage:
#   1. Copy .env.example to .env and add your API keys
#   2. Run: docker compose up
#
# Custom ports (if defaults conflict):
#   API_PORT=8090 WEB_PORT=3001 docker compose up
#
# Services:
#   - Web UI: http://localhost:3000 (or $WEB_PORT)
#   - API: http://localhost:8080 (or $API_PORT)
#   - API Docs: http://localhost:8080/docs

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - USE_LITELLM=false
      - GONG_MCP_URL=https://id-pain-gong-mcp.vercel.app
      - CREWAI_TRACING_ENABLED=false
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  web:
    image: node:20-bookworm-slim
    working_dir: /app
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      # FASTAPI_ORIGIN is read at runtime by middleware/rewrites for API proxying
      # Do NOT set NEXT_PUBLIC_* here - those get embedded in client JS and break Docker networking
      - FASTAPI_ORIGIN=http://api:8080
      - WATCHPACK_POLLING=true
      - NODE_ENV=development
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    command: ["sh", "-c", "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"]
    depends_on:
      - api

volumes:
  web_node_modules:
