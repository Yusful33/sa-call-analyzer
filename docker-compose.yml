# Stillness - Simple Local Development with Docker
# Uses Vercel-deployed Gong MCP (no need to run locally)
#
# Usage:
#   1. Copy .env.example to .env and add your API keys
#   2. Run: docker compose up
#
# Services:
#   - Web UI: http://localhost:3000
#   - API: http://localhost:8080
#   - API Docs: http://localhost:8080/docs

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - USE_LITELLM=false
      - GONG_MCP_URL=https://id-pain-gong-mcp.vercel.app
      - CREWAI_TRACING_ENABLED=false
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    image: node:20-bookworm-slim
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_LEGACY_API_URL=http://localhost:8080
      - WATCHPACK_POLLING=true
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    command: ["sh", "-c", "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"]
    depends_on:
      - api

volumes:
  web_node_modules:
