    <p>
      This deployment exposes <strong>HTTP API routes</strong> under <code>/api/*</code> (for example
      <code>GET /api/health</code>). There is no SPA here — point <code>GONG_MCP_URL</code> at this host’s
      origin and the FastAPI app will call <code>/api/transcript</code>, <code>/api/calls</code>, etc.
    </p>
