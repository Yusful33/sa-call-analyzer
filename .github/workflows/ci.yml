# Stillness — verify web build, API imports (Vercel parity), and live doc URLs.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  doc-links:
    name: Canonical doc URLs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install httpx only
        run: python -m pip install --upgrade pip && pip install "httpx==0.28.1"
      - name: Check docs.arize.com links
        env:
          DOC_LINKS_JSON: "1"
        run: python scripts/check_doc_links.py

  web-build:
    name: Next.js lint & build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  api-bundle:
    name: API import smoke (requirements.txt)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - name: Install API dependencies (matches Vercel install path)
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Import FastAPI app (catches missing modules / syntax errors)
        run: python -c "import main; assert main.app is not None; print('import ok')"
