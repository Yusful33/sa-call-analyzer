# Auto-deploy apps/api to Vercel on push to main and rebind the public alias
# arize-gtm-stillness-api.vercel.app -> the new deployment.
#
# Why this exists
# ---------------
# The Vercel project for arize-gtm-stillness-api is on a Team plan that creates
# per-user "production" aliases (e.g. -ycattaneo-5285-arize-ai.vercel.app,
# -htekgul-5649-arize-ai.vercel.app). When someone runs `vercel deploy --prod`
# locally, only that user's per-user alias is updated; the bare public URL
# arize-gtm-stillness-api.vercel.app stays bound to whichever deployment last
# claimed it. That means merging to main does NOT update production unless the
# right person redeploys + re-aliases.
#
# This workflow runs in CI under a service-account-style Vercel token so every
# merge to main becomes the live production deployment, regardless of who
# authored the change.
#
# Required repository secrets:
#   VERCEL_TOKEN            - https://vercel.com/account/tokens (scope to this team)
#
# Hardcoded (not secrets - these are public on every Vercel deployment URL):
#   VERCEL_ORG_ID           - team_mHUqqvHme5qZRriqBKxSYVDK
#   VERCEL_PROJECT_ID       - prj_HmrfWPp1WtlTN6QfGz7jklXeXcCQ
#   PUBLIC_ALIAS            - arize-gtm-stillness-api.vercel.app
name: Deploy API to Vercel

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api-vercel
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: team_mHUqqvHme5qZRriqBKxSYVDK
  VERCEL_PROJECT_ID: prj_HmrfWPp1WtlTN6QfGz7jklXeXcCQ
  PUBLIC_ALIAS: arize-gtm-stillness-api.vercel.app

jobs:
  deploy:
    name: Deploy apps/api -> production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run from the repo root: VERCEL_PROJECT_ID + the project's Root Directory
    # setting in the Vercel UI handle scoping. Running from apps/api combined
    # with a Root Directory of "apps/api" caused a doubled "apps/api/apps/api"
    # path resolution. The git-integration deploy uses this same shape.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to production
        id: deploy
        # No `vercel build --prebuilt` step: the @vercel/python runtime does not
        # produce a `.vercel/output/builds.json` for the prebuilt deploy path,
        # so `vercel deploy --prebuilt` 500s with ENOENT on builds.json. Letting
        # Vercel build remotely matches the manual `vercel deploy --prod` flow
        # that worked locally and uses Vercel's own build cache.
        run: |
          set -euo pipefail
          deployment_url=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Deployed: $deployment_url"

      - name: Rebind public alias
        run: |
          vercel alias set \
            "${{ steps.deploy.outputs.deployment_url }}" \
            "${PUBLIC_ALIAS}" \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Smoke-test public URL
        run: |
          set -euo pipefail
          # Give the alias rebind a moment to propagate, then verify the public URL
          # is healthy. If /health is unhealthy or the alias still points at an
          # older deployment, fail the workflow loudly.
          sleep 5
          response=$(curl -sS --max-time 30 "https://${PUBLIC_ALIAS}/health")
          echo "$response" | python3 -m json.tool
          status=$(printf '%s' "$response" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("status",""))')
          if [ "$status" != "healthy" ]; then
            echo "::error::Public alias /health returned status=$status"
            exit 1
          fi
          echo "OK: ${PUBLIC_ALIAS} reports status=healthy"

      - name: Summary
        if: always()
        run: |
          echo "## Vercel deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deployment | ${{ steps.deploy.outputs.deployment_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Public alias | https://${PUBLIC_ALIAS} |" >> "$GITHUB_STEP_SUMMARY"
