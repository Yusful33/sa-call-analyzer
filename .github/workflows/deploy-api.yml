# Auto-deploy apps/api to Vercel on push to main and rebind the public alias
# arize-gtm-stillness-api.vercel.app -> the new deployment.
#
# Why this exists
# ---------------
# The Vercel project for arize-gtm-stillness-api is on a Team plan that creates
# per-user "production" aliases (e.g. -ycattaneo-5285-arize-ai.vercel.app,
# -htekgul-5649-arize-ai.vercel.app). When someone runs `vercel deploy --prod`
# locally, only that user's per-user alias is updated; the bare public URL
# arize-gtm-stillness-api.vercel.app stays bound to whichever deployment last
# claimed it. That means merging to main does NOT update production unless the
# right person redeploys + re-aliases.
#
# This workflow runs in CI under a service-account-style Vercel token so every
# merge to main becomes the live production deployment, regardless of who
# authored the change.
#
# Required repository secrets:
#   VERCEL_TOKEN            - https://vercel.com/account/tokens (scope to this team)
#
# Hardcoded (not secrets - these are public on every Vercel deployment URL):
#   VERCEL_ORG_ID           - team_mHUqqvHme5qZRriqBKxSYVDK
#   VERCEL_PROJECT_ID       - prj_HmrfWPp1WtlTN6QfGz7jklXeXcCQ
#   PUBLIC_ALIAS            - arize-gtm-stillness-api.vercel.app
name: Deploy API to Vercel

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api-vercel
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: team_mHUqqvHme5qZRriqBKxSYVDK
  VERCEL_PROJECT_ID: prj_HmrfWPp1WtlTN6QfGz7jklXeXcCQ
  PUBLIC_ALIAS: arize-gtm-stillness-api.vercel.app

jobs:
  deploy:
    name: Deploy apps/api -> production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ env.VERCEL_ORG_ID }}

      - name: Deploy to production
        id: deploy
        run: |
          set -euo pipefail
          deployment_url=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ env.VERCEL_ORG_ID }})
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Deployed: $deployment_url"

      - name: Rebind public alias
        run: |
          vercel alias set \
            "${{ steps.deploy.outputs.deployment_url }}" \
            "${PUBLIC_ALIAS}" \
            --scope=${{ env.VERCEL_ORG_ID }} \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Smoke-test deployment
        continue-on-error: true
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -uo pipefail
          sleep 5
          health_url="${{ steps.deploy.outputs.deployment_url }}/health"
          echo "Checking $health_url"
          curl_args=(-sS --max-time 30)
          if [ -n "${VERCEL_AUTOMATION_BYPASS_SECRET:-}" ]; then
            curl_args+=(-H "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}")
          fi
          if ! response=$(curl "${curl_args[@]}" "$health_url"); then
            echo "::warning::Smoke test request failed (deploy + alias already succeeded). Add VERCEL_AUTOMATION_BYPASS_SECRET repo secret to enable protected health checks."
            exit 0
          fi
          echo "$response" | python3 -m json.tool || {
            echo "::warning::Non-JSON /health response (likely deployment protection). Deploy + alias already succeeded."
            exit 0
          }
          status=$(printf '%s' "$response" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("status",""))')
          if [ "$status" != "healthy" ]; then
            echo "::warning::Deployment /health returned status=$status"
            exit 0
          fi
          echo "OK: deployment reports status=healthy"

      - name: Summary
        if: always()
        run: |
          echo "## Vercel deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deployment | ${{ steps.deploy.outputs.deployment_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Public alias | https://${PUBLIC_ALIAS} |" >> "$GITHUB_STEP_SUMMARY"
