# Auto-deploy apps/web (Next.js) to Vercel on push to main and rebind the
# public alias arize-gtm-stillness.vercel.app -> the new deployment.
#
# Mirror of .github/workflows/deploy-api.yml; see that file for the rationale
# (Vercel team-plan per-user aliases mean local `vercel deploy --prod` only
# updates the deploying user's alias, not the shared public URL).
#
# Required repository secrets:
#   VERCEL_TOKEN            - https://vercel.com/account/tokens (scope to this team)
#                             SAME secret as deploy-api.yml — set once
#
# Hardcoded (not secrets - these are public on every Vercel deployment URL):
#   VERCEL_ORG_ID           - team_mHUqqvHme5qZRriqBKxSYVDK
#   VERCEL_PROJECT_ID       - prj_BqSieqGxCJGqrTrdskTSunhyBMnd
#   PUBLIC_ALIAS            - arize-gtm-stillness.vercel.app
name: Deploy Web to Vercel

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web-vercel
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: team_mHUqqvHme5qZRriqBKxSYVDK
  VERCEL_PROJECT_ID: prj_BqSieqGxCJGqrTrdskTSunhyBMnd
  PUBLIC_ALIAS: arize-gtm-stillness.vercel.app

jobs:
  deploy:
    name: Deploy apps/web -> production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # NOTE: Do NOT set working-directory here. The Vercel project has Root Directory
    # set to "apps/web" in its settings, so running from repo root lets Vercel resolve
    # paths correctly. Setting working-directory: apps/web would cause path doubling
    # (apps/web/apps/web).
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ env.VERCEL_ORG_ID }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artifact
        id: deploy
        run: |
          set -euo pipefail
          deployment_url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ env.VERCEL_ORG_ID }})
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Deployed: $deployment_url"

      - name: Rebind public alias
        run: |
          vercel alias set \
            "${{ steps.deploy.outputs.deployment_url }}" \
            "${PUBLIC_ALIAS}" \
            --scope=${{ env.VERCEL_ORG_ID }} \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Smoke-test public URL
        run: |
          set -euo pipefail
          # The Next.js project exposes a tiny Edge-middleware health endpoint at
          # /api/health (separate from the FastAPI /health that lives behind the
          # /api/* proxy). Verifying it confirms the alias rebind landed.
          sleep 5
          response=$(curl -sS --max-time 30 "https://${PUBLIC_ALIAS}/api/health")
          echo "$response" | python3 -m json.tool
          ok=$(printf '%s' "$response" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("ok",""))')
          if [ "$ok" != "True" ]; then
            echo "::error::Public alias /api/health returned ok=$ok"
            exit 1
          fi
          echo "OK: ${PUBLIC_ALIAS} reports ok=true"

      - name: Summary
        if: always()
        run: |
          echo "## Vercel deploy (web)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deployment | ${{ steps.deploy.outputs.deployment_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Public alias | https://${PUBLIC_ALIAS} |" >> "$GITHUB_STEP_SUMMARY"
